name: Sync MeltedGlassOpenGL

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync:
    name: Advance MeltedGlassOpenGL submodule
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MeltedUIFramework
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update MeltedGlassOpenGL submodule
        run: scripts/sync_melted_glass.sh external/MeltedGlassOpenGL

      - name: Commit submodule update
        run: |
          if git diff --quiet -- external/MeltedGlassOpenGL; then
            echo "MeltedGlassOpenGL is already up to date."
            exit 0
          fi

          upstream_sha="$(git -C external/MeltedGlassOpenGL rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add external/MeltedGlassOpenGL
          git commit -m "Sync MeltedGlassOpenGL ${upstream_sha:0:12}"
          git push
